<!DOCTYPE html>
<html>
<head>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #game {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    
    window.EJS_player = '#game';
    window.EJS_core = params.get('core');
    window.EJS_gameUrl = params.get('url');
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_gameName = params.get('name');
    window.EJS_startOnLoaded = true; // Auto-start the emulator core directly into the game
    
    // Some PSX / Saturn games may request a BIOS. We use a public EmulatorJS stable BIOS repository:
    if (window.EJS_core === 'psx') {
      window.EJS_biosUrl = 'https://cdn.emulatorjs.org/stable/data/bios.bin'; // Placeholder standard path
    }
    
    window.EJS_disableDatabases = false;
    window.EJS_disableLocalStorage = false;
    
    if (params.get('stateUrl')) {
      window.EJS_loadStateURL = params.get('stateUrl');
    }
    
    // Disable the default built-in onscreen gamepad so we can use our custom one
    window.EJS_Buttons = {
      playPause: false,
      restart: false,
      mute: false,
      settings: false,
      fullscreen: false,
      saveState: false,
      loadState: false,
      virtualGamepad: false,
      quickSave: false,
      quickLoad: false
    };
    window.EJS_buttons = window.EJS_Buttons; // Case sensitive fallback
    window.EJS_VirtualGamepadSettings = [];
    window.EJS_disableVirtualGamepad = true;
    window.EJS_disableGamepad = true;
    
    // Minimal CSS to only hide the specific virtual gamepad elements without breaking touch events
    const style = document.createElement('style');
    style.innerHTML = `
      .ejs-virtual-gamepad, #ejs-virtual-gamepad, .emulatorjs-gamepad,
      [id*="gamepad"], [class*="gamepad"],
      [id*="button"]:not(canvas), [class*="btn"],
      #game > div:not(:first-child) {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    `;
    document.head.appendChild(style);

    // Set up proxy callbacks to parent
    window.EJS_ready = function() {
      if (parent && parent.window.EJS_ready) parent.window.EJS_ready();
    };
    window.EJS_onSaveState = function(data) {
      if (parent && parent.window.EJS_onSaveState) parent.window.EJS_onSaveState(data);
    };
    window.EJS_onLoadState = function(data) {
      if (parent && parent.window.EJS_onLoadState) parent.window.EJS_onLoadState(data);
    };

    const script = document.createElement('script');
    script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
    document.body.appendChild(script);
  </script>
</body>
</html>
