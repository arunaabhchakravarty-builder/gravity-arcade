<!DOCTYPE html>
<html>
<head>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #game {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    
    window.EJS_player = '#game';
    window.EJS_core = params.get('core');
    window.EJS_gameUrl = params.get('url');
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_gameName = params.get('name');
    window.EJS_startOnLoaded = true; // Auto-start the emulator core directly into the game
    
    // Some PSX / Saturn games may request a BIOS. We use a public EmulatorJS stable BIOS repository:
    if (window.EJS_core === 'psx') {
      window.EJS_biosUrl = 'https://cdn.emulatorjs.org/stable/data/bios.bin'; // Placeholder standard path
    }
    
    window.EJS_disableDatabases = false;
    window.EJS_disableLocalStorage = false;
    
    if (params.get('stateUrl')) {
      window.EJS_loadStateURL = params.get('stateUrl');
    }
    
    // Disable the default built-in onscreen gamepad so we can use our custom one
    window.EJS_Buttons = {
      playPause: false,
      restart: false,
      mute: false,
      settings: false,
      fullscreen: false,
      saveState: false,
      loadState: false,
      virtualGamepad: false,
      quickSave: false,
      quickLoad: false
    };
    window.EJS_buttons = window.EJS_Buttons; // Case sensitive fallback
    window.EJS_VirtualGamepadSettings = [];
    window.EJS_disableVirtualGamepad = true;
    window.EJS_disableGamepad = true;
    
    // MOCK GAMEPAD API FOR VIRTUAL CONTROLLER
    const virtualGamepadState = {
      buttons: new Array(17).fill(false),
      axes: [0, 0, 0, 0]
    };
    
    const mockGamepad = {
      id: "Gravity Arcade Virtual Gamepad",
      index: 0,
      connected: true,
      timestamp: 0,
      mapping: "standard",
      axes: virtualGamepadState.axes,
      buttons: virtualGamepadState.buttons.map(p => ({ pressed: p, touched: p, value: p ? 1.0 : 0.0 }))
    };

    const originalGetGamepads = navigator.getGamepads ? navigator.getGamepads.bind(navigator) : null;
    navigator.getGamepads = function() {
      let realGamepads = null;
      if (originalGetGamepads) {
        try {
          realGamepads = originalGetGamepads();
        } catch (e) {
          console.warn("Could not get native gamepads:", e);
        }
      }
      // If a real gamepad is connected, use it. Otherwise, return our virtual one.
      if (realGamepads && realGamepads[0] && realGamepads[0].connected) {
        return realGamepads;
      }
      
      mockGamepad.timestamp = performance.now();
      mockGamepad.buttons = virtualGamepadState.buttons.map(p => ({ pressed: p, touched: p, value: p ? 1.0 : 0.0 }));
      mockGamepad.axes = [...virtualGamepadState.axes];
      return [mockGamepad, null, null, null];
    };

    window.addEventListener('message', (event) => {
      if (!event.data) return;
      
      if (event.data.type === 'gamepad') {
        const { button, pressed } = event.data;
        if (button !== undefined && button >= 0 && button < 17) {
          virtualGamepadState.buttons[button] = pressed;
          
          // Map D-pad buttons (12-15) to Analog Stick Axes (0, 1) as some emulators ignore D-pad buttons
          if (button === 12) virtualGamepadState.axes[1] = pressed ? -1.0 : (virtualGamepadState.buttons[13] ? 1.0 : 0.0); // Up
          if (button === 13) virtualGamepadState.axes[1] = pressed ? 1.0 : (virtualGamepadState.buttons[12] ? -1.0 : 0.0); // Down
          if (button === 14) virtualGamepadState.axes[0] = pressed ? -1.0 : (virtualGamepadState.buttons[15] ? 1.0 : 0.0); // Left
          if (button === 15) virtualGamepadState.axes[0] = pressed ? 1.0 : (virtualGamepadState.buttons[14] ? -1.0 : 0.0); // Right
        }
      } else if (event.data.type === 'keyboard') {
        const { key, eventType, keyCode } = event.data;
        const e = new KeyboardEvent(eventType, {
          key: key,
          code: key,
          keyCode: keyCode,
          which: keyCode,
          bubbles: true,
          cancelable: true
        });
        document.dispatchEvent(e);
        window.dispatchEvent(e);
        
        // Also dispatch to canvas if it exists
        const canvas = document.querySelector('canvas');
        if (canvas) canvas.dispatchEvent(new KeyboardEvent(eventType, { key, code: key, keyCode, which: keyCode, bubbles: true, cancelable: true }));
      }
    });

    // Minimal CSS to only hide the specific virtual gamepad elements without breaking touch events
    const style = document.createElement('style');
    style.innerHTML = `
      .ejs-virtual-gamepad, #ejs-virtual-gamepad, .emulatorjs-gamepad,
      [id*="gamepad"], [class*="gamepad"],
      [id*="button"]:not(canvas), [class*="btn"],
      #game > div:not(:first-child) {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    `;
    document.head.appendChild(style);

    // Set up proxy callbacks to parent
    window.EJS_ready = function() {
      if (parent && parent.window.EJS_ready) parent.window.EJS_ready();
    };
    window.EJS_onSaveState = function(data) {
      if (parent && parent.window.EJS_onSaveState) parent.window.EJS_onSaveState(data);
    };
    window.EJS_onLoadState = function(data) {
      if (parent && parent.window.EJS_onLoadState) parent.window.EJS_onLoadState(data);
    };

    const script = document.createElement('script');
    script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
    document.body.appendChild(script);
  </script>
</body>
</html>
