<!DOCTYPE html>
<html>
<head>
  <title>🕹️ Retro Arcade Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --primary: #38bdf8;
      --primary-hover: #0369a1;
      --error: #ef4444;
      --success: #22c55e;
    }
    body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: var(--card-bg); padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
    h1 { margin-top: 0; color: var(--primary); font-family: 'Orbitron', sans-serif; text-align: center; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #cbd5e1; }
    input[type=password], input[type=file] { width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    input[type=password]:focus { outline: none; border-color: var(--primary); }
    button { width: 100%; background: var(--primary); color: #000; border: none; padding: 0.875rem; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Orbitron', sans-serif; transition: all 0.2s; font-size: 1rem; }
    button:hover { background: #7dd3fc; transform: translateY(-1px); }
    button:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }
    .status { margin-top: 1rem; text-align: center; padding: 0.75rem; border-radius: 6px; display: none; font-weight: bold; }
    .status.error { display: block; background: rgba(239, 68, 68, 0.2); color: var(--error); border: 1px solid var(--error); }
    .status.success { display: block; background: rgba(34, 197, 94, 0.2); color: var(--success); border: 1px solid var(--success); }
    .hidden { display: none; }
    
    .nav-link { display: block; text-align: center; margin-top: 2rem; color: #94a3b8; text-decoration: none; }
    .nav-link:hover { color: white; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ROM Uploader</h1>
    
    <div id="loginSection">
      <div class="form-group">
        <label>Admin Secret</label>
        <input type="password" id="secretInput" placeholder="Enter the master secret" />
      </div>
      <button id="loginBtn">Authenticate</button>
    </div>

    <div id="uploadSection" class="hidden">
      <div class="form-group">
        <label>Select ROM File (.nes, .sfc, .md, .gba, etc.)</label>
        <input type="file" id="romFile" accept=".nes,.sfc,.smc,.gen,.md,.gb,.gbc,.gba,.z64,.n64,.nds,.cue,.iso,.zip" />
      </div>
      <button id="uploadBtn">Upload to Cloud Storage</button>
      <div style="text-align: center; margin-top: 15px;">
         <a href="#" id="logoutBtn" style="color: #ef4444; font-size: 0.9rem; text-decoration: none;">Logout / Clear Secret</a>
      </div>
    </div>
    
    <div id="statusMsg" class="status"></div>
    
    <a href="/" class="nav-link">← Back to Arcade</a>
  </div>

  <script>
    const loginSection = document.getElementById('loginSection');
    const uploadSection = document.getElementById('uploadSection');
    const secretInput = document.getElementById('secretInput');
    const loginBtn = document.getElementById('loginBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const romFile = document.getElementById('romFile');
    const statusMsg = document.getElementById('statusMsg');
    const logoutBtn = document.getElementById('logoutBtn');

    // Check if logged in
    if (localStorage.getItem('adminSecret')) {
      loginSection.classList.add('hidden');
      uploadSection.classList.remove('hidden');
    }

    function showStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status ' + type;
      setTimeout(() => { statusMsg.style.display = 'none'; statusMsg.className = 'status'; }, 5000);
    }

    loginBtn.addEventListener('click', () => {
      const secret = secretInput.value.trim();
      if (!secret) return;
      localStorage.setItem('adminSecret', secret);
      loginSection.classList.add('hidden');
      uploadSection.classList.remove('hidden');
      secretInput.value = '';
    });
    
    logoutBtn.addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('adminSecret');
      uploadSection.classList.add('hidden');
      loginSection.classList.remove('hidden');
    });

    uploadBtn.addEventListener('click', async () => {
      const file = romFile.files[0];
      const secret = localStorage.getItem('adminSecret');
      
      if (!file) {
        return showStatus('Please select a file first.', 'error');
      }
      if (!secret) {
        return showStatus('Not authenticated.', 'error');
      }

      const formData = new FormData();
      formData.append('rom', file);

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading...';
      
      try {
        const response = await fetch('/admin/upload', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + secret
          },
          body: formData
        });

        if (response.ok) {
          showStatus('ROM successfully uploaded!', 'success');
          romFile.value = '';
        } else {
          const text = await response.text();
          showStatus(text || 'Upload failed. Check secret.', 'error');
          if (response.status === 403) {
            localStorage.removeItem('adminSecret');
            uploadSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
          }
        }
      } catch (err) {
        showStatus('Network error during upload.', 'error');
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload to Cloud Storage';
      }
    });
  </script>
</body>
</html>
